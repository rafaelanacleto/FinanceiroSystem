services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: financeiro-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Rafael.2026!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    networks:
      - financeiro-net
    volumes:
      - sqlserver_data:/var/opt/mssql

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: financeiro-auth
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=dev-file
    ports:
      - "8080:8080"
    networks:
      - financeiro-net

  redis:
    image: redis:alpine
    container_name: financeiro-cache
    ports:
      - "6379:6379"
    networks:
      - financeiro-net

networks:
  financeiro-net:
    driver: bridge

volumes:
  sqlserver_data:
