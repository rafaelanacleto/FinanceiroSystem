services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: financeiro-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Rafael.2026!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    networks:
      - financeiro-net
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Rafael.2026!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: financeiro-auth
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
      #KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    ports:
      - "0.0.0.0:8080:8080"
    networks:
      - financeiro-net
    volumes:
      - keycloak_data:/opt/keycloak/data

  redis:
    image: redis:alpine
    container_name: financeiro-cache
    ports:
      - "6379:6379"
    networks:
      - financeiro-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: financeiro-rabbit
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - financeiro-net

